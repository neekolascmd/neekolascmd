name: Update README Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=neekolascmd&show_icons=true&theme=github_dark&border_color=ff6b35&title_color=ff6b35&icon_color=ff6b35&text_color=c9d1d9&bg_color=0d1117&hide_border=false&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=neekolascmd&layout=compact&theme=github_dark&border_color=ff6b35&title_color=ff6b35&text_color=c9d1d9&bg_color=0d1117&hide_border=false&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=neekolascmd&repo=ankermake-m5-protocol&theme=github_dark&border_color=ff6b35&title_color=ff6b35&icon_color=ff6b35&text_color=c9d1d9&bg_color=0d1117
          path: profile/pin-ankermake-m5-protocol.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stat cards" || exit 0
          git push
